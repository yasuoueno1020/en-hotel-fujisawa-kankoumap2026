<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エンホテル藤沢 観光マップ2026</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    #sidebar {
      width: 300px;
      background: #fff;
      border-right: 1px solid #ddd;
      padding: 16px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    #sidebar h2 {
      margin: 0 0 16px;
      font-size: 22px;
    }

    #shop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #shop-list li {
      padding: 12px;
      margin-bottom: 10px;
      background: #f7f7f7;
      border-radius: 8px;
      cursor: pointer;
    }

    #shop-list li:hover {
      background: #eaeaea;
    }

    #shop-list li.active {
      background: #d0ebff;
      border-left: 4px solid #339af0;
    }

    #map {
      flex: 1;
      height: 100%;
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: 220px;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }

      #map {
        height: calc(100vh - 220px);
      }
    }
  </style>
</head>

<body>
 <div id="app">
  <div id="sidebar">
    <h2>店舗一覧</h2>
    <ul id="shop-list"></ul>
  </div>

  <div id="map"></div>

  <!-- 👇ここに追加 -->
  <div id="detail">
    <h2 id="detail-name">店舗名</h2>
    <p id="detail-desc">説明</p>
    <img id="detail-img" src="" style="width:200px;">
  </div>

</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([35.31, 139.48], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const shopList = document.getElementById('shop-list');

    fetch('shops.csv')
      .then(response => response.text())
      .then(data => {
        const rows = data.trim().split('\n').slice(1);

        rows.forEach(row => {
          if (!row.trim()) return;

          const cols = row.split(',');

          const name = cols[0];
          const lat = parseFloat(cols[1]);
          const lng = parseFloat(cols[2]);
          const desc = cols[3] || '';
          const img = cols[4] || '';

          if (isNaN(lat) || isNaN(lng)) return;

          const popupHtml = `
            <div style="width:200px; font-family:sans-serif;">
              <div style="font-weight:bold; font-size:18px; margin-bottom:6px;">
                ${name}
              </div>
              <div style="margin-bottom:8px; color:#555; font-size:14px;">
                ${desc}
              </div>
              ${img ? `<img src="images/${img}" style="width:100%; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.2);">` : ''}
            </div>
          `;

          const marker = L.marker([lat, lng])
            .addTo(map)
            .bindPopup(popupHtml);

          const li = document.createElement('li');
          li.innerHTML = `
            <strong>${name}</strong><br>
            <span style="color:#666; font-size:14px;">${desc}</span>
          `;

          li.addEventListener('click', () => {
            map.setView([lat, lng], 16);
            marker.openPopup();

            document.querySelectorAll('#shop-list li').forEach(el => {
              el.classList.remove('active');
            });

            li.classList.add('active');
          });

          shopList.appendChild(li);
        });
      })
      .catch(error => {
        console.error('CSV読み込みエラー:', error);
      });
  </script>
</body>
</html>
