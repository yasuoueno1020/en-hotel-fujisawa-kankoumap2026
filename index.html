<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エンホテル藤沢 観光マップ2026</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    #sidebar {
      width: 300px;
      background: #fff;
      border-right: 1px solid #ddd;
      padding: 16px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #map {
      height: 65%;
      width: 100%;
    }

    #detail {
      height: 35%;
      padding: 20px;
      background: #fff;
      border-top: 1px solid #ddd;
      box-sizing: border-box;
      overflow-y: auto;
    }

    #shop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #shop-list li {
      padding: 12px;
      margin-bottom: 10px;
      background: #f7f7f7;
      border-radius: 8px;
      cursor: pointer;
    }

    #shop-list li.active {
      background: #d0ebff;
      border-left: 4px solid #339af0;
    }

    #detail-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    #detail-img {
      width: 220px;
      max-height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: 180px;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }

      #main {
        height: calc(100vh - 180px);
      }

      #map {
        height: 55%;
      }

      #detail {
        height: 45%;
      }

      #detail-card {
        flex-direction: column;
      }

      #detail-img {
        width: 100%;
        max-height: none;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="sidebar">
      <h2>店舗一覧</h2>
      <ul id="shop-list"></ul>
    </div>

    <div id="main">
      <div id="map"></div>

      <div id="detail">
        <h2 id="detail-name">店舗を選択してください</h2>
        <div id="detail-card">
          <img id="detail-img" src="" alt="" style="display:none;">
          <div>
            <p id="detail-desc">左の店舗一覧、または地図上のピンをクリックすると詳細が表示されます。</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([35.31, 139.48], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const shopList = document.getElementById('shop-list');

    function showDetail(name, desc, img) {
      document.getElementById('detail-name').textContent = name;
      document.getElementById('detail-desc').textContent = desc;

      const detailImg = document.getElementById('detail-img');

      if (img) {
        detailImg.src = "images/" + img;
        detailImg.style.display = "block";
      } else {
        detailImg.style.display = "none";
      }
    }

    fetch('shops.csv')
      .then(response => response.text())
      .then(data => {
        const rows = data.trim().split('\n').slice(1);

        rows.forEach(row => {
          if (!row.trim()) return;

          const cols = row.split(',');

          const name = cols[0];
          const lat = parseFloat(cols[1]);
          const lng = parseFloat(cols[2]);
          const desc = cols[3] || '';
          const img = cols[4] || '';

          if (isNaN(lat) || isNaN(lng)) return;

          const popupHtml = `
            <div style="width:200px;">
              <strong>${name}</strong><br>
              ${desc}
            </div>
          `;

          const marker = L.marker([lat, lng])
            .addTo(map)
            .bindPopup(popupHtml);

          const li = document.createElement('li');
          li.innerHTML = `
            <strong>${name}</strong><br>
            <span style="color:#666; font-size:14px;">${desc}</span>
          `;

          function selectShop() {
            map.setView([lat, lng], 16);
            marker.openPopup();

            document.querySelectorAll('#shop-list li').forEach(el => {
              el.classList.remove('active');
            });

            li.classList.add('active');
            showDetail(name, desc, img);
          }

          li.addEventListener('click', selectShop);
          marker.on('click', selectShop);

          shopList.appendChild(li);
        });
      });
  </script>
</body>
</html>
