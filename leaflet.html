<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エンホテル藤沢 観光マップ2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    #sidebar {
      width: 320px;
      background: #fff;
      border-right: 1px solid #ddd;
      padding: 16px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #map {
      height: 58%;
      width: 100%;
    }

    #detail {
      height: 42%;
      padding: 24px;
      background: #fff;
      border-top: 1px solid #ddd;
      box-sizing: border-box;
      overflow-y: auto;
    }

    #shop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #shop-list li {
      padding: 12px;
      margin-bottom: 10px;
      background: #f7f7f7;
      border-radius: 8px;
      cursor: pointer;
    }

    #shop-list li.active {
      background: #d0ebff;
      border-left: 4px solid #339af0;
    }

    .shop-id {
      font-size: 12px;
      color: #777;
      margin-bottom: 4px;
    }

    #detail-card {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      max-width: 1000px;
    }

    #detail-img {
      width: 240px;
      height: auto;
      max-height: 200px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    #detail-info {
      flex: 1;
      min-width: 240px;
    }

    .label {
      font-weight: bold;
      color: #333;
    }

    .detail-row {
      margin-bottom: 7px;
      line-height: 1.5;
    }

    .qr-img {
      width: 120px;
      margin-top: 6px;
      border: 1px solid #ddd;
      padding: 6px;
      background: #fff;
    }

    .meta {
      font-size: 12px;
      color: #777;
      margin-bottom: 12px;
    }

    a {
      color: #0066cc;
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: 180px;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }

      #main {
        height: calc(100vh - 180px);
      }

      #map {
        height: 48%;
      }

      #detail {
        height: 52%;
        padding: 16px;
      }

      #detail-card {
        flex-direction: column;
      }

      #detail-img {
        width: 100%;
        max-height: none;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="sidebar">
      <h2>店舗一覧</h2>
      <ul id="shop-list"></ul>
    </div>

    <div id="main">
      <div id="map"></div>

      <div id="detail">
        <h2 id="detail-name">店舗を選択してください</h2>
        <div class="meta" id="detail-ids"></div>

        <div id="detail-card">
          <img id="detail-img" src="" alt="" style="display:none;">

          <div id="detail-info">
            <p>左の店舗一覧、または地図上のピンをクリックすると詳細が表示されます。</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([35.31, 139.48], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const shopList = document.getElementById('shop-list');

    function showDetail(shop) {
      document.getElementById('detail-name').textContent = shop.name;

      document.getElementById('detail-ids').textContent =
        "SHOP ID: " + shop.shopId +
        " / IMAGE ID: " + shop.imageId +
        " / QR ID: " + shop.qrId;

      const detailImg = document.getElementById('detail-img');

      if (shop.imageFile) {
        detailImg.src = "images/shop/" + shop.imageFile;
        detailImg.alt = shop.imageId;
        detailImg.style.display = "block";
      } else {
        detailImg.style.display = "none";
      }

      document.getElementById('detail-info').innerHTML = `
        <div class="detail-row"><span class="label">エリア：</span>${shop.area}</div>
        <div class="detail-row"><span class="label">一言説明：</span>${shop.shortDesc}</div>
        <div class="detail-row"><span class="label">強み：</span>${shop.strength}</div>
        <div class="detail-row"><span class="label">おすすめ：</span>${shop.recommend}</div>
        <div class="detail-row"><span class="label">ターゲット：</span>${shop.target}</div>
        <div class="detail-row"><span class="label">所要時間：</span>${shop.duration}</div>
        <div class="detail-row"><span class="label">混雑：</span>${shop.crowd}</div>
        ${shop.shopUrl ? `<div class="detail-row"><a href="${shop.shopUrl}" target="_blank">SHOP URL</a></div>` : ''}
        ${shop.qrImage ? `
          <div class="detail-row">
            <span class="label">QRコード：</span><br>
            <img src="images/qr/${shop.qrImage}" class="qr-img" alt="${shop.qrId}">
          </div>
        ` : ''}
      `;
    }

    fetch('shops.csv')
      .then(response => response.text())
      .then(data => {
        const rows = data.trim().split('\n').slice(1);

        rows.forEach(row => {
          if (!row.trim()) return;

          const cols = row.split(',');

          const shop = {
            shopId: cols[0] || '',
            name: cols[1] || '',
            lat: parseFloat(cols[2]),
            lng: parseFloat(cols[3]),
            imageId: cols[4] || '',
            imageFile: cols[5] || '',
            qrId: cols[6] || '',
            qrImage: cols[7] || '',
            area: cols[8] || '',
            shortDesc: cols[9] || '',
            strength: cols[10] || '',
            recommend: cols[11] || '',
            target: cols[12] || '',
            duration: cols[13] || '',
            crowd: cols[14] || '',
            shopUrl: cols[15] || ''
          };

          if (isNaN(shop.lat) || isNaN(shop.lng)) return;

          const popupHtml = `
            <div style="width:200px;">
              <strong>${shop.name}</strong><br>
              ${shop.shortDesc}
            </div>
          `;

          const marker = L.marker([shop.lat, shop.lng])
            .addTo(map)
            .bindPopup(popupHtml);

          const li = document.createElement('li');
          li.innerHTML = `
            <div class="shop-id">${shop.shopId}</div>
            <strong>${shop.name}</strong><br>
            <span style="color:#666; font-size:14px;">${shop.shortDesc}</span>
          `;

          function selectShop() {
            map.setView([shop.lat, shop.lng], 16);
            marker.openPopup();

            document.querySelectorAll('#shop-list li').forEach(el => {
              el.classList.remove('active');
            });

            li.classList.add('active');
            showDetail(shop);
          }

          li.addEventListener('click', selectShop);
          marker.on('click', selectShop);

          shopList.appendChild(li);
        });
      })
      .catch(error => {
        console.error('CSV読み込みエラー:', error);
      });
  </script>
</body>
</html>
